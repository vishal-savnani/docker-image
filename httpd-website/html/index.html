<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp Shoes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <div class="container">
        <h1 class="logo">StepUp</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Men</a>
            <a href="#">Women</a>
            <a href="#">Contact</a>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <h2>Upgrade Your Style</h2>
        <p>Premium shoes for every occasion</p>
        <button>Shop Now</button>
    </div>
</section>

<section class="products container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="">
        <h3>Running Shoes</h3>
        <p>$59</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1528701800489-20be3c1b3b8b" alt="">
        <h3>Casual Sneakers</h3>
        <p>$49</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519" alt="">
        <h3>Formal Shoes</h3>
        <p>$79</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1582582494700-7d4f6c2c3b0b" alt="">
        <h3>Sports Shoes</h3>
        <p>$69</p>
        <button>Add to Cart</button>
    </div>

</section>

<footer class="footer">
    <p>© 2026 StepUp Shoes. All rights reserved.</p>
</footer>

</body>
</html>
